<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Fusion Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            color: #fff; 
            padding: 20px;
            min-height: 100vh;
            background-attachment: fixed;
        }

        header { text-align: center; padding: 50px 0 30px 0; }
        
        h1 { 
            font-size: 3rem; 
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 25px; 
            background: linear-gradient(to right, #00f2fe, #4facfe, #00adb5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 30px rgba(79, 172, 254, 0.3);
        }

        .filter-nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
        }

        .card:hover { 
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 12px 40px 0 rgba(0, 242, 254, 0.15);
        }

        .card-media-link { display: block; position: relative; }
        .card img { width: 100%; height: 230px; object-fit: cover; background: rgba(255,255,255,0.02); display: block; }

        .play-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15,23,42,0.25);
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .card-media-link:hover .play-overlay,
        .card-media-link:active .play-overlay { opacity: 1; }
        .play-circle {
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
        }
        .play-circle::after {
            content: "";
            border-style: solid;
            border-width: 9px 0 9px 15px;
            border-color: transparent transparent transparent #fff;
            margin-left: 4px;
        }
        .open-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(15,23,42,0.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.15);
            color: #00f2fe;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 5px 10px;
            border-radius: 999px;
            pointer-events: none;
        }
        
        .card-content { padding: 22px; }
        
        .card-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00f2fe;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .card-title { font-size: 1.35rem; margin-bottom: 8px; color: #fff; font-weight: 700; }
        .card-desc { color: #b4b6c4; font-size: 0.95rem; line-height: 1.6; margin-bottom: 14px; }

        .card-link-btn {
            display: inline-flex; align-items: center; gap: 6px;
            color: #00f2fe;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 700;
            border: 1px solid rgba(0,242,254,0.3);
            padding: 8px 14px;
            border-radius: 999px;
            transition: background 0.2s ease;
        }
        .card-link-btn:hover { background: rgba(0,242,254,0.1); }

        .loading { text-align: center; color: #888; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <h1>Pixel Fusion</h1>
        
        <div class="filter-nav">
            <button class="filter-btn active" onclick="filterSelection('all')">✨ All Work</button>
            <button class="filter-btn" onclick="filterSelection('logo')">🎨 Logo</button>
            <button class="filter-btn" onclick="filterSelection('thumbnail')">🖼️ Thumbnail</button>
            <button class="filter-btn" onclick="filterSelection('video')">🎬 Video</button>
            <button class="filter-btn" onclick="filterSelection('website')">💻 Website</button>
        </div>
    </header>

    <div class="loading" id="loader">Syncing showcase layout...</div>
    <div class="grid" id="portfolio-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADd_THieNiwl-aRIiFpURkg0inlwZPQjY",
            authDomain: "pixel-fusion-c7400.firebaseapp.com",
            projectId: "pixel-fusion-c7400",
            appId: "1:738589690133:web:744ad4c309e2788303c11c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProjects = [];

        async function loadPortfolio() {
            const grid = document.getElementById('portfolio-grid');
            const loader = document.getElementById('loader');
            try {
                const q = query(collection(db, "projects"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                loader.style.display = 'none';
                
                if(snap.empty) {
                    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; color:#666;">No designs uploaded yet.</p>';
                    return;
                }

                snap.forEach((doc) => {
                    allProjects.push({ id: doc.id, ...doc.data() });
                });

                renderCards(allProjects);
            } catch (e) { loader.innerText = "Connection error."; }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.innerText = str || "";
            return div.innerHTML;
        }

        window.renderCards = function(projectsToRender) {
            const grid = document.getElementById('portfolio-grid');
            grid.innerHTML = "";
            projectsToRender.forEach((data) => {
                const card = document.createElement('div');
                card.className = 'card';

                const cat = (data.category || '').toLowerCase();
                const hasLink = (cat === 'website' || cat === 'video') && data.projectLink;

                // Media block: wrapped in a link if it's a website/video with a saved link
                let mediaHtml = `<img src="${data.imageUrl}" alt="${escapeHtml(data.title)}">`;
                if (hasLink) {
                    const badgeText = cat === 'website' ? 'Visit site ↗' : 'Watch video ↗';
                    const overlay = cat === 'video'
                        ? `<div class="play-overlay"><div class="play-circle"></div></div>`
                        : `<div class="play-overlay"></div>`;
                    mediaHtml = `
                        <a class="card-media-link" href="${data.projectLink}" target="_blank" rel="noopener noreferrer">
                            <img src="${data.imageUrl}" alt="${escapeHtml(data.title)}">
                            ${overlay}
                            <span class="open-badge">${badgeText}</span>
                        </a>`;
                }

                // Below-card button as a second, obvious way to open it
                let linkBtnHtml = "";
                if (hasLink) {
                    const label = cat === 'website' ? 'Open website ↗' : 'Watch video ↗';
                    linkBtnHtml = `<a class="card-link-btn" href="${data.projectLink}" target="_blank" rel="noopener noreferrer">${label}</a>`;
                }

                card.innerHTML = `
                    ${mediaHtml}
                    <div class="card-content">
                        <div class="card-category">${escapeHtml(data.category || 'Work')}</div>
                        <h3 class="card-title">${escapeHtml(data.title)}</h3>
                        <p class="card-desc">${escapeHtml(data.description)}</p>
                        ${linkBtnHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.filterSelection = function(category) {
            const btns = document.getElementsByClassName("filter-btn");
            for (let i = 0; i < btns.length; i++) {
                btns[i].classList.remove("active");
                if(btns[i].innerText.toLowerCase().includes(category)) {
                    btns[i].classList.add("active");
                } else if (category === 'all' && i === 0) {
                    btns[i].classList.add("active");
                }
            }

            if(category === 'all') {
                renderCards(allProjects);
            } else {
                const filtered = allProjects.filter(p => p.category && p.category.toLowerCase() === category);
                const grid = document.getElementById('portfolio-grid');
                if(filtered.length === 0) {
                    grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#888; padding:40px;">No items in ${category} category yet.</p>`;
                } else {
                    renderCards(filtered);
                }
            }
        }

        loadPortfolio();
    </script>
</body>
</html>
