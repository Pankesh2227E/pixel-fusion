<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Fusion Portfolio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        html, body {
            background:
                radial-gradient(circle at 15% 10%, rgba(99, 102, 241, 0.10), transparent 45%),
                radial-gradient(circle at 85% 25%, rgba(56, 189, 248, 0.10), transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(244, 114, 182, 0.08), transparent 50%),
                #ffffff;
            background-attachment: fixed;
            color: #0f172a;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.locked { overflow: hidden; height: 100vh; }

        /* ---------- HOME SCREEN ---------- */
        #home {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 24px 60px;
        }

        .logo-img {
            width: 100%;
            max-width: 360px;
            height: auto;
            cursor: pointer;
            margin-bottom: 18px;
        }

        .tagline {
            text-align: center;
            color: #475569;
            font-size: 0.98rem;
            line-height: 1.55;
            max-width: 340px;
            margin-bottom: 38px;
        }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
            max-width: 360px;
        }

        .cat-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 18px 22px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            box-shadow:
                0 1px 1px rgba(15,23,42,0.04),
                0 12px 32px rgba(15,23,42,0.08),
                inset 0 1px 0 rgba(255,255,255,0.95);
            font-size: 1.05rem;
            font-weight: 600;
            color: #0f172a;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .cat-btn:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.75);
        }

        .cat-icon {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            background: rgba(15, 23, 42, 0.05);
            flex-shrink: 0;
        }

        .cat-arrow {
            margin-left: auto;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* ---------- LOGO FULLSCREEN VIEWER ---------- */
        #logo-viewer {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 30px;
        }
        #logo-viewer.open { opacity: 1; pointer-events: all; }
        #logo-viewer img { width: 100%; max-width: 480px; height: auto; }
        #logo-viewer .close-x {
            position: absolute;
            top: 24px; right: 24px;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(15,23,42,0.06);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
            color: #0f172a;
        }

        /* ---------- CATEGORY SLIDE-UP PANEL ---------- */
        #panel-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.18);
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #panel-overlay.open { opacity: 1; pointer-events: all; }

        #panel {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            height: 92vh;
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 28px 28px 0 0;
            border-top: 1px solid rgba(255,255,255,0.6);
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 -10px 50px rgba(15,23,42,0.18);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #panel.open { transform: translateY(0); }

        .panel-handle {
            width: 42px; height: 5px;
            background: rgba(15,23,42,0.15);
            border-radius: 999px;
            margin: 12px auto 6px;
            flex-shrink: 0;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px 16px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(15,23,42,0.06);
        }
        .panel-title {
            font-size: 1.3rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .panel-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: rgba(15,23,42,0.06);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
            color: #0f172a;
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        @media (min-width: 640px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }

        .card {
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(15,23,42,0.08);
            position: relative;
        }

        .card-media-link { display: block; position: relative; }
        .card img { width: 100%; height: 210px; object-fit: cover; display: block; background: #f1f5f9; }

        /* Logo cards show the full image uncropped instead of a fixed-height crop */
        .card.logo-card img { height: auto; max-height: none; object-fit: contain; background: #ffffff; }

        .play-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15,23,42,0.15);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .card-media-link:active .play-overlay { opacity: 1; }
        .play-circle {
            width: 52px; height: 52px; border-radius: 50%;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.6);
            display: flex; align-items: center; justify-content: center;
        }
        .play-circle::after {
            content: "";
            border-style: solid;
            border-width: 9px 0 9px 15px;
            border-color: transparent transparent transparent #0f172a;
            margin-left: 4px;
        }
        .open-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(15,23,42,0.08);
            color: #0f172a;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 5px 10px;
            border-radius: 999px;
            pointer-events: none;
        }

        .card-content { padding: 18px 20px 22px; }
        .card-title { font-size: 1.15rem; margin-bottom: 6px; color: #0f172a; font-weight: 700; }
        .card-desc { color: #64748b; font-size: 0.9rem; line-height: 1.55; margin-bottom: 12px; }

        .card-link-btn {
            display: inline-flex; align-items: center; gap: 6px;
            color: #0f172a;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid rgba(15,23,42,0.15);
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(15,23,42,0.03);
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            padding: 60px 20px;
            font-size: 0.95rem;
        }

        .loading { text-align: center; color: #94a3b8; padding: 40px; }
    </style>
</head>
<body>

    <!-- HOME -->
    <div id="home">
        <img class="logo-img" id="logo-trigger"
             src="https://i.ibb.co/GfqLZtsc/9-F595-B04-C4-EC-4-A73-8-B77-60-F5-C603-B03-F.png"
             alt="Pixel Fusion logo"
             loading="eager" fetchpriority="high" decoding="sync">

        <p class="tagline">
            One creative studio, three disciplines — logos, websites, and video, all designed and edited by hand.<br>
            Tap a category below to see real client work.
        </p>

        <div class="btn-stack">
            <button class="cat-btn" data-cat="logo">
                <span class="cat-icon">🎨</span> Logo <span class="cat-arrow">→</span>
            </button>
            <button class="cat-btn" data-cat="thumbnail">
                <span class="cat-icon">🖼️</span> Thumbnail <span class="cat-arrow">→</span>
            </button>
            <button class="cat-btn" data-cat="website">
                <span class="cat-icon">💻</span> Website <span class="cat-arrow">→</span>
            </button>
            <button class="cat-btn" data-cat="video">
                <span class="cat-icon">🎬</span> Video <span class="cat-arrow">→</span>
            </button>
        </div>
    </div>

    <!-- LOGO FULLSCREEN VIEWER -->
    <div id="logo-viewer">
        <div class="close-x" id="logo-viewer-close">✕</div>
        <img src="https://i.ibb.co/GfqLZtsc/9-F595-B04-C4-EC-4-A73-8-B77-60-F5-C603-B03-F.png" alt="Pixel Fusion logo full size">
    </div>

    <!-- SLIDE-UP CATEGORY PANEL -->
    <div id="panel-overlay"></div>
    <div id="panel">
        <div class="panel-handle"></div>
        <div class="panel-header">
            <div class="panel-title"><span id="panel-icon"></span><span id="panel-title-text"></span></div>
            <div class="panel-close" id="panel-close">✕</div>
        </div>
        <div class="panel-body" id="panel-body">
            <div class="loading">Loading…</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADd_THieNiwl-aRIiFpURkg0inlwZPQjY",
            authDomain: "pixel-fusion-c7400.firebaseapp.com",
            projectId: "pixel-fusion-c7400",
            appId: "1:738589690133:web:744ad4c309e2788303c11c"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProjects = [];
        let loaded = false;

        const catMeta = {
            logo: { label: "Logo", icon: "🎨" },
            thumbnail: { label: "Thumbnail", icon: "🖼️" },
            website: { label: "Website", icon: "💻" },
            video: { label: "Video", icon: "🎬" }
        };

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.innerText = str || "";
            return div.innerHTML;
        }

        async function loadAllProjects() {
            if (loaded) return allProjects;
            const q = query(collection(db, "projects"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            allProjects = [];
            snap.forEach((doc) => allProjects.push({ id: doc.id, ...doc.data() }));
            loaded = true;
            return allProjects;
        }

        function renderCards(items, cat) {
            const body = document.getElementById('panel-body');
            if (items.length === 0) {
                body.innerHTML = `<div class="empty-state">No ${catMeta[cat].label.toLowerCase()} work uploaded yet — check back soon.</div>`;
                return;
            }
            const grid = document.createElement('div');
            grid.className = 'grid';
            items.forEach((data) => {
                const card = document.createElement('div');
                card.className = cat === 'logo' ? 'card logo-card' : 'card';
                const c = (data.category || '').toLowerCase();
                const hasLink = (c === 'website' || c === 'video') && data.projectLink;

                let mediaHtml = `<img src="${data.imageUrl}" alt="${escapeHtml(data.title)}" loading="lazy" decoding="async">`;
                if (hasLink) {
                    const badgeText = c === 'website' ? 'Visit site ↗' : 'Watch video ↗';
                    const overlay = c === 'video' ? `<div class="play-overlay"><div class="play-circle"></div></div>` : `<div class="play-overlay"></div>`;
                    mediaHtml = `
                        <a class="card-media-link" href="${data.projectLink}" target="_blank" rel="noopener noreferrer">
                            <img src="${data.imageUrl}" alt="${escapeHtml(data.title)}" loading="lazy" decoding="async">
                            ${overlay}
                            <span class="open-badge">${badgeText}</span>
                        </a>`;
                }

                let linkBtnHtml = "";
                if (hasLink) {
                    const label = c === 'website' ? 'Open website ↗' : 'Watch video ↗';
                    linkBtnHtml = `<a class="card-link-btn" href="${data.projectLink}" target="_blank" rel="noopener noreferrer">${label}</a>`;
                }

                card.innerHTML = `
                    ${mediaHtml}
                    <div class="card-content">
                        <h3 class="card-title">${escapeHtml(data.title)}</h3>
                        <p class="card-desc">${escapeHtml(data.description)}</p>
                        ${linkBtnHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
            body.innerHTML = "";
            body.appendChild(grid);
        }

        async function openPanel(cat) {
            const meta = catMeta[cat];
            document.getElementById('panel-icon').innerText = meta.icon;
            document.getElementById('panel-title-text').innerText = meta.label;
            document.getElementById('panel-body').innerHTML = '<div class="loading">Loading…</div>';

            document.getElementById('panel-overlay').classList.add('open');
            document.getElementById('panel').classList.add('open');
            document.body.classList.add('locked');

            try {
                const all = await loadAllProjects();
                const filtered = all.filter(p => (p.category || '').toLowerCase() === cat);
                renderCards(filtered, cat);
            } catch (e) {
                document.getElementById('panel-body').innerHTML = '<div class="empty-state">Could not load work right now. Try again shortly.</div>';
            }
        }

        function closePanel() {
            document.getElementById('panel-overlay').classList.remove('open');
            document.getElementById('panel').classList.remove('open');
            document.body.classList.remove('locked');
        }

        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => openPanel(btn.getAttribute('data-cat')));
        });
        document.getElementById('panel-overlay').addEventListener('click', closePanel);
        document.getElementById('panel-close').addEventListener('click', closePanel);

        // Logo fullscreen viewer
        const viewer = document.getElementById('logo-viewer');
        document.getElementById('logo-trigger').addEventListener('click', () => viewer.classList.add('open'));
        document.getElementById('logo-viewer-close').addEventListener('click', () => viewer.classList.remove('open'));
        viewer.addEventListener('click', (e) => { if (e.target === viewer) viewer.classList.remove('open'); });
    </script>
</body>
</html>
